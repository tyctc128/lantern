// ==================== STORAGE ====================
const STORAGE_KEY = 'lantern_riddle_states';
function loadStates() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // Validate: must have all riddle ids
      const valid = riddles.every(r => parsed[r.id]);
      if (valid) return parsed;
    }
  } catch(e) {}
  return null;
}
function saveStates(states) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(states)); } catch(e) {}
}
function clearStates() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// ==================== BACKGROUND MUSIC ====================
const BGMManager = {
  playlist: ['sounds/new_year_1.mp3', 'sounds/new_year_2.mp3'],
  currentIndex: 0,
  audio: null,
  muted: false,
  started: false,

  init() {
    if (this.started) return;
    this.started = true;
    this.audio = new Audio();
    this.audio.volume = 0.15;
    this.audio.addEventListener('ended', () => {
      this.currentIndex = (this.currentIndex + 1) % this.playlist.length;
      this.playCurrentTrack();
    });
    this.playCurrentTrack();
  },

  playCurrentTrack() {
    if (!this.audio) return;
    this.audio.src = this.playlist[this.currentIndex];
    this.audio.volume = this.muted ? 0 : 0.15;
    this.audio.play().catch(()=>{});
  },

  setMuted(muted) {
    this.muted = muted;
    if (this.audio) {
      this.audio.volume = muted ? 0 : 0.15;
    }
  }
};

// ==================== SOUND ====================
const SoundManager = {
  initialized: false, muted: false,
  async init() {
    if (this.initialized) return;
    try { await Tone.start(); Tone.Destination.volume.value = -6; this.initialized = true; } catch(e) {}
    BGMManager.init();
  },
  play(name) {
    if (!this.initialized || this.muted) return;
    try {
      switch(name) {
        case 'lanternTap': { const s = new Tone.MembraneSynth({volume:-8}).toDestination(); s.triggerAttackRelease("C4","8n"); setTimeout(()=>s.dispose(),1000); break; }
        case 'reveal': { const s = new Tone.Synth({volume:-6,oscillator:{type:'triangle'}}).toDestination(); const n=Tone.now(); s.triggerAttackRelease("C5","16n",n); s.triggerAttackRelease("E5","16n",n+0.15); s.triggerAttackRelease("G5","16n",n+0.3); s.triggerAttackRelease("C6","8n",n+0.45); setTimeout(()=>s.dispose(),2000); break; }
        case 'firework': { const s = new Tone.NoiseSynth({volume:-12,noise:{type:'white'},envelope:{attack:0.01,decay:0.3,sustain:0}}).toDestination(); s.triggerAttack(); setTimeout(()=>s.dispose(),500); break; }
        case 'complete': { const s = new Tone.PolySynth(Tone.Synth,{volume:-6}).toDestination(); const n=Tone.now(); s.triggerAttackRelease("C5","8n",n); s.triggerAttackRelease("E5","8n",n+0.2); s.triggerAttackRelease("G5","8n",n+0.4); s.triggerAttackRelease(["C5","E5","G5","C6"],"4n",n+0.6); setTimeout(()=>s.dispose(),3000); break; }
        case 'click': { const s = new Tone.Synth({volume:-10,oscillator:{type:'sine'},envelope:{attack:0.01,decay:0.1,sustain:0,release:0.1}}).toDestination(); s.triggerAttackRelease("A5","32n"); setTimeout(()=>s.dispose(),500); break; }
      }
    } catch(e) {}
  },
  toggleMute() {
    this.muted = !this.muted;
    BGMManager.setMuted(this.muted);
    return this.muted;
  }
};

// ==================== FIREWORK CANVAS ====================
function FireworkCanvas({ trigger, intensity }) {
  const canvasRef = useRef(null);
  const particlesRef = useRef([]);
  const animRef = useRef(null);
  useEffect(() => {
    if (!trigger) return;
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const colors = ['#FF4444','#FFD700','#FF6B35','#FF1744','#FFEB3B','#FF9800','#E91E63','#FF5722'];
    const count = intensity === 'grand' ? 8 : 3;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const cx = Math.random()*canvas.width*0.6+canvas.width*0.2;
        const cy = Math.random()*canvas.height*0.4+canvas.height*0.1;
        for (let j = 0; j < 50; j++) {
          const angle = (Math.PI*2/50)*j+Math.random()*0.3;
          const speed = 2+Math.random()*4;
          particlesRef.current.push({ x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, life:1, decay:0.012+Math.random()*0.015, color:colors[Math.floor(Math.random()*colors.length)], size:2+Math.random()*3 });
        }
        SoundManager.play('firework');
      }, i * 400);
    }
    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particlesRef.current = particlesRef.current.filter(p=>p.life>0);
      particlesRef.current.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.vx*=0.99; p.life-=p.decay;
        ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (particlesRef.current.length>0) animRef.current=requestAnimationFrame(animate);
    }
    animRef.current=requestAnimationFrame(animate);
    return ()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
  }, [trigger, intensity]);
  return <canvas ref={canvasRef} className="fixed inset-0 z-[60] pointer-events-none" />;
}

}

      </div>

      <div className="text-center py-6 text-slate-500 text-sm">
        <p>更多精彩關卡即將推出，敬請期待...</p>
      </div>
    </main>
  );
}

// ==================== FOOTER ====================
function Footer() {
  return (
    <footer className="bg-background-dark/50 border-t border-white/5 py-8 mt-auto">
      <div className="max-w-7xl mx-auto px-6 text-center text-slate-600 text-xs">
        © 2024 燈籠夜遊製作委員會. All Rights Reserved.
      </div>
    </footer>
  );
}

// ==================== MAIN APP ====================
function GameApp() {
  const [phase, setPhase] = useState('start');
  const [view, setView] = useState('home'); // home | riddle
  // Load from localStorage or init fresh
  const [riddleStates, setRiddleStates] = useState(()=>{
    const saved = loadStates();
    if (saved) return saved;
    const s={}; riddles.forEach(r=>s[r.id]='locked'); return s;
  });
  const [selectedRiddle, setSelectedRiddle] = useState(null);
  const [soundMuted, setSoundMuted] = useState(false);
  const [horseState, setHorseState] = useState('idle');
  const [horseMsg, setHorseMsg] = useState('');

  // Persist riddle states to localStorage whenever they change
  useEffect(()=>{ saveStates(riddleStates); }, [riddleStates]);

  const completedCount = useMemo(()=>Object.values(riddleStates).filter(s=>s==='completed').length,[riddleStates]);

  const handleStart = async () => {
    await SoundManager.init();
    SoundManager.play('click');
    setPhase('playing');
  };

  const handleSelect = (id) => {
    SoundManager.play('lanternTap');
    setRiddleStates(prev => {
      if (prev[id] === 'locked') return {...prev, [id]: 'opened'};
      return prev;
    });
    setSelectedRiddle(id);
    setView('riddle');
    setHorseMsg('仔細想想看哦！');
    setHorseState('idle');
  };

  const handleReveal = (id) => {
    setRiddleStates(prev => ({...prev, [id]: 'revealed'}));
    setHorseState('celebrating');
    const msg = encouragements[Math.floor(Math.random() * encouragements.length)];
    setHorseMsg(msg);
    setTimeout(()=>{
      setRiddleStates(prev => {
        const newStates = {...prev, [id]: 'completed'};
        // Check all done
        const allDone = Object.values(newStates).every(s=>s==='completed');
        if (allDone) {
          setTimeout(()=>{ setView('home'); setPhase('ended'); }, 2000);
        }
        return newStates;
      });
      setHorseState('idle');
    }, 2500);
  };

  const handleBackToHome = () => {
    setView('home');
    setSelectedRiddle(null);
    setHorseMsg('');
  };

  // Full reset — clear localStorage and reset all states
  const handleReset = () => {
    SoundManager.play('click');
    clearStates();
    const s={}; riddles.forEach(r=>s[r.id]='locked');
    setRiddleStates(s);
    setSelectedRiddle(null);
    setView('home');
  };

  const handleRestart = () => {
    handleReset();
    setPhase('playing');
  };

  const toggleMute = () => { const m = SoundManager.toggleMute(); setSoundMuted(m); };

  if (phase === 'start') return <StartScreen onStart={handleStart}/>;
  if (phase === 'ended') return <EndScreen completedCount={completedCount} total={riddles.length} onRestart={handleRestart}/>;

  const currentRiddle = selectedRiddle ? riddles.find(r=>r.id===selectedRiddle) : null;

  if (view === 'riddle' && currentRiddle) {
    return (
      <div className="min-h-screen flex flex-col" style={{backgroundColor:'#1a0b0b'}}>
        <RiddleHeader completedCount={completedCount} total={riddles.length} soundMuted={soundMuted} onToggleMute={toggleMute} onBack={handleBackToHome}/>
        <RiddleView
          riddle={currentRiddle}
          status={riddleStates[currentRiddle.id]}
          onReveal={handleReveal}
          onBack={handleBackToHome}
          horseMsg={horseMsg}
          horseState={horseState}
        />
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col" style={{backgroundColor:'#221010'}}>
      <HomeHeader completedCount={completedCount} total={riddles.length} soundMuted={soundMuted} onToggleMute={toggleMute} onReset={handleReset}/>
      <HomeView riddles={riddles} riddleStates={riddleStates} completedCount={completedCount} onSelect={handleSelect} currentRiddleId={selectedRiddle}/>
      <Footer/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<GameApp/>);
</script>
</body>
</html>
